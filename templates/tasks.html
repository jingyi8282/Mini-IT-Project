<!DOCTYPE html>
<html>
    <head>
        <title> Tasks page </title>
        <link rel="stylesheet" href="{{ url_for('static', filename='style.css')}}">
    </head>

<body>
 
<h1> TASKS PAGE </h1>

<form method="POST" action="/add">
    <input type="text" name="tasks" placeholder="Enter task">
    <button type="submit">Add Tasks</button>
</form>

<h3> My Tasks </h3>
<ul>
    {% for t in tasks %}
        <li>{{ t }}</li>
    {% endfor %}
</ul>

</body>
</html>
