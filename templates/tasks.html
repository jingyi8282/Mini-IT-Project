<!DOCTYPE html>
<html>
    <head>
        <title> Tasks page </title>
        <link rel="stylesheet" href="{{ url_for('static', filename='taskstyle.css')}}">
    </head>

<body>
 
<h1> TASKS PAGE </h1>

<section>

<form class="add_form" method="POST" action="/add">
    <input type="text" name="tasks" placeholder="Enter task">
    <button type="submit" class="add_button">Add Tasks</button>
</form>

</section>

<div class="tasks_list">

    <div class="task_column">
        <h3 class="h2_column"> My Tasks </h3>
        <ul>
            {% for t in tasks %}
                <li>
                    {{ t }}
                    <form action="/delete/{{loop.index0}}" method="POST" style="display: inline; ">
                    <button type="submit" class="task_btn">Delete</button></form>
                </li>
            {% endfor %}
        </ul>
    </div>

    <div class="task_column">
        <h3 class="h2_column"> In Progress </h3>
    </div>

    <div class="task_column">
        <h3 class="h2_column"> Completed </h3>
    </div>

</div>

</body>
</html>
