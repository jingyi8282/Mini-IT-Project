<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Profile</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='profile.css') }}">
</head>
<body>
    <div style="padding: 15px;">
        <a href="/profile" style="color: #2B124C; text-decoration: none; font-weight: bold;">← Back to Profile</a>
    </div>

    <div class="profile-container">
        <h2 style="text-align: center; color: #2B124C; margin-bottom: 20px;">Edit Profile</h2>
        
        <form method="POST">
            <div class="info-row">
                <label class="info-label">Name:</label>
                <input type="text" name="name" value="{{ name }}" style="padding: 8px; width: 70%; border-radius: 8px; border: 1px solid #2B124C;">
            </div>
            
            <div class="info-row">
                <label class="info-label">Bio:</label>
                <textarea name="bio" rows="3" style="width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #2B124C; font-family: Arial;">{{ bio }}</textarea>
            </div>
            
            <div class="btn-group" style="margin-top: 20px;">
                <button type="submit" class="btn-primary">Save Changes</button>
                <a href="/profile" class="btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</body>
</html>
