<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Room</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='focus.css') }}">
    <style>
        .notes-area {
            background: #dfb6b2;
            padding: 15px;
            border-radius: 12px;
            border-left: 8px solid #854f6c;
            margin-top: 10px;
        }
        .notes-area textarea {
            width: 100%;
            height: 100px;
            padding: 10px;
            border-radius: 8px;
            border: 2px solid #2B124C;
            background: #fbe4d8;
            font-family: inherit;
            box-sizing: border-box;
            resize: none;
        }
        .file-input {
            font-size: 11px;
            margin: 10px 0;
            display: block;
        }
        .btn-row {
            display: flex;
            gap: 10px;
        }
        .btn-row button {
            flex: 1;
            padding: 8px;
            background: #522b5b;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-row button:hover {
            background: #854f6c;
        }
        .ai-result {
            margin-top: 15px;
            padding: 10px;
            background: #fbe4d8;
            border-radius: 8px;
            font-size: 12px;
            text-align: left;
            max-height: 150px;
            overflow-y: auto;
            color: #2B124C;
        }
    </style>
</head>
<body>
    
<header>Focus Room</header>
<section class="focus_layout">
    <div class="focus_card">
        <h2>Deep Work Mode</h2>
        </div>  
    
    <div class="focus_card">
        <h2>Quick Notes & AI</h2>
        <div class="notes-area">
            {% if error %}<p style="color: red; font-size: 11px;">⚠️ {{ error }}</p>{% endif %}
            
            <form action="{{ url_for('focus_room') }}" method="POST" enctype="multipart/form-data">
                <textarea name="content" placeholder="Paste notes here..."></textarea>
                <input type="file" name="pdf_file" class="file-input" accept=".pdf, .docx">
                
                <div class="btn-row">
                    <button type="submit" name="action" value="summarize">Summarize</button>
                    <button type="submit" name="action" value="quiz">Quiz</button>
                </div>
            </form>

            {% if result %}
                <div class="ai-result">
                    <strong>🤖 AI Result:</strong><br>
                    {{ result | replace('\n', '<br>') | safe }}
                </div>
            {% endif %}
        </div>
    </div>

    <div class="focus_card">
        <h2>Break Zone</h2>
        </div>

    <div class="focus_card">
        <h2>Quote Section</h2>
        </div>
</section>

<div style="text-align: center; margin-top: 20px;">
    <a href="{{ url_for('tasks') }}" style="color: white; text-decoration: none;">← Back to Dashboard</a>
</div>

</body>
</html>
