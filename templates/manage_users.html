{% extends "admin_base.html" %}
{% block content %}
    <link rel="stylesheet" href="{{ url_for('static', filename='manage_users.css') }}">
    
    <header>USERS LIST</header>

    <div class="users_table">
        <table>
            <thead>
                <tr>
                    <th>Id</th>
                    <th>Username</th>
                    <th>Email</th>
                    <th>Joined Date</th>
                    <th>Delete</th>
                </tr>
            </thead>
            <tbody>
                {% if users %}
                    {% for user in users %}
                        <tr>
                            <td>{{ loop.index }}</td>
                            <td>{{ user.username }}</td>
                            <td>{{ user.email }}</td>
                            <td>{{ user.joined_date }}</td>
                            <td>
                                <form action="{{ url_for('admin_delete_user', email=user.email) }}" method="POST" 
                                      onsubmit="return confirm('⚠️ WARNING: Delete {{ user.username }}? This will delete their account permanently and cannot be undone!')">
                                    <button type="submit" class="del_btn">Delete</button>
                                </form>
                            </td>
                        </tr>
                    {% endfor %}
                {% else %}
                    <tr>
                        <td colspan="5">No users found</td>
                    </tr>
                {% endif %}
            </tbody>
        </table>
    </div>
{% endblock %}
