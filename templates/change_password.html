<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Change Password</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='profile.css') }}">
</head>
<body>
    <div style="padding: 15px;">
        <a href="/profile" style="color: #2B124C; text-decoration: none; font-weight: bold;">← Back to Profile</a>
    </div>

    <div class="profile-container">
        <h2 style="text-align: center; color: #2B124C; margin-bottom: 20px;">Change Password</h2>
        
        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}
        
        {% if success %}
            <div class="success">{{ success }}</div>
        {% endif %}
        
        <form method="POST">
            <div class="info-row">
                <label class="info-label">Current Password:</label>
                <input type="password" name="current_password" required style="padding: 8px; width: 70%; border-radius: 8px; border: 1px solid #2B124C;">
            </div>
            
            <div class="info-row">
                <label class="info-label">New Password:</label>
                <input type="password" name="new_password" required style="padding: 8px; width: 70%; border-radius: 8px; border: 1px solid #2B124C;">
                <small style="display: block; color: #666; margin-top: 5px;">Minimum 6 characters</small>
            </div>
            
            <div class="info-row">
                <label class="info-label">Confirm Password:</label>
                <input type="password" name="confirm_password" required style="padding: 8px; width: 70%; border-radius: 8px; border: 1px solid #2B124C;">
            </div>
            
            <div class="btn-group" style="margin-top: 20px;">
                <button type="submit" class="btn-primary">Update Password</button>
                <a href="/profile" class="btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</body>
</html>
