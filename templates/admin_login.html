<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login - Study Planner</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='admin.css') }}">
</head>
<body>
    <div class="form-container">
        <h2>👑 Admin Login</h2>
        <p class="admin-subtitle">Access the administrator panel</p>
        
        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}
        
        <form method="POST">
            <label>Email</label>
            <input type="email" name="email" placeholder="Enter your admin email..." required>
            
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter your admin password..." required>
            
            <button type="submit">Login</button>
        </form>
        
        <p><a href="{{ url_for('login') }}">← Back to User Login Page</a></p>
        
        <div class="admin-note">
            ⚠️ <span>Authorized personnel only</span>
        </div>
    </div>
</body>
</html>
