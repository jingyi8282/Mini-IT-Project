<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Study Assistant - Notes</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='notes.css') }}">
</head>
<body>

    <div class="ai-card">
        <h2>📚 AI Quick Notes</h2>
        
        {% if error %}
            <div class="error-box">
                <strong>⚠️ Error:</strong>
                <p>{{ error }}</p>
            </div>
        {% endif %}
        
        <form method="POST" enctype="multipart/form-data">
            <textarea name="content" placeholder="Paste notes here..."></textarea>
            
            <div class="pdf-upload-section">
                <label>Upload Note (PDF or Word):</label>
                <input type="file" name="pdf_file" accept=".pdf, .docx">
            </div>
            
            <div class="btn-group">
                <button type="submit" name="action" value="summarize">📝 Summarize</button>
                <button type="submit" name="action" value="quiz">❓ Generate Quiz</button>
            </div>
        </form>

        {% if result %}
            <div class="result-box">
                <strong>🤖 AI Response:</strong>
                <div class="result-content">{{ result | replace('\n', '<br>') | safe }}</div>
            </div>
        {% endif %}

        <a href="{{ url_for('home') }}" class="back-link">← Back to Dashboard</a>
    </div>

</body>
</html>
